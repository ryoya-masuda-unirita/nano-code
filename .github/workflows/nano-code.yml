on:
  workflow_dispatch:
    inputs:
      task:
        description: "Nano code に実行させるタスク"
        required: false
        default: 'これはてすとです'
  issues:
    types: [opened]

permissions: {}

jobs:
  nano-code:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Git ユーザーを設定
        run: |
          git config user.name "nano-code[bot]"
          git config user.email "nano-code[bot]@users.noreply.github.com"
      - name: Nano Code 実行
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          ISSUE_BODY: ${{ inputs.task }}
          ISSUE_TEXT: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: bun run agent --yolo
